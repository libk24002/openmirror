apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmirror
  labels:
    app: openmirror
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openmirror
  template:
    metadata:
      labels:
        app: openmirror
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: openmirror
          image: ghcr.io/libk24002/openmirror:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OPENMIRROR_CACHE_DIR
              value: /var/cache/openmirror
          volumeMounts:
            - name: cache
              mountPath: /var/cache/openmirror
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: openmirror-cache
